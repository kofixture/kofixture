# Detekt configuration for Kofixture
# Extends detekt defaults — only explicit overrides are listed here.
# Full default config reference: https://detekt.dev/docs/introduction/configurations

build:
  maxIssues: 0

style:
  MaxLineLength:
    # Align with ktlint's default of 140 characters.
    maxLineLength: 140
  MagicNumber:
    # Disable for tests — magic numbers in test assertions are self-documenting.
    # Generated code is excluded globally via the Detekt source config (build/generated/**).
    excludes: ['**/*Test.kt', '**/test/**']
    ignoreRanges: true
