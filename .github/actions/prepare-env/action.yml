name: Prepare environment
description: Set up JDK 21 and Gradle for CI

runs:
  using: composite
  steps:
    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: zulu

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3
