name: Release

# TODO: This workflow is DISABLED until secrets are configured.
# Before enabling:
# 1. Add GitHub Secrets: OSSRH_USERNAME, OSSRH_PASSWORD
# 2. Add GitHub Secrets: SIGNING_KEY_ID, SIGNING_KEY, SIGNING_PASSWORD
# 3. Remove the "if: false" condition from the publish job

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare-env

      - name: Publish to Maven Central
        working-directory: projects
        run: IS_RELEASE=true ./gradlew publishAggregationToCentralPortal
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
