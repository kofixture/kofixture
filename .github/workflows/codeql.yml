name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 6'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/prepare-env

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build (JVM only — CodeQL analyses JVM bytecode)
        working-directory: projects
        run: ./gradlew :kofixture-core:compileKotlin :kofixture-kotest:compileKotlin

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
